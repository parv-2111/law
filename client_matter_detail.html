<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Matter Detail | DK CORPORATE LAW FIRM</title>
  <link rel="stylesheet" href="css/matter.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    /* ── Page wrap ── */
    .md-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 24px 52px;
    }

    /* ── Top bar ── */
    .md-topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }
    .md-back {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: var(--dark3);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 0.9rem;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
      flex-shrink: 0;
    }
    .md-back:hover { background: rgba(201,162,39,0.1); color: var(--gold); }
    .md-topbar-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--white);
      flex: 1;
    }
    .md-topbar-no {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 20px;
      background: rgba(201,162,39,0.1);
      color: var(--gold);
      border: 1px solid rgba(201,162,39,0.25);
      font-family: monospace;
      letter-spacing: 0.5px;
    }

    /* ── Hero banner ── */
    .md-hero {
      background: linear-gradient(135deg, #0f1e35 0%, #1a2e4a 60%, #0f1e35 100%);
      border: 1px solid rgba(201,162,39,0.18);
      border-radius: 18px;
      padding: 28px;
      margin-bottom: 24px;
      display: flex;
      align-items: flex-start;
      gap: 20px;
    }
    .md-hero-icon {
      width: 60px; height: 60px;
      border-radius: 16px;
      background: rgba(201,162,39,0.12);
      border: 1px solid rgba(201,162,39,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; color: var(--gold);
      flex-shrink: 0;
    }
    .md-hero-body { flex: 1; }
    .md-hero-body h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--white);
      margin-bottom: 10px;
      line-height: 1.3;
    }
    .md-hero-pills {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .md-pill {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.75rem; font-weight: 600;
      padding: 4px 13px;
      border-radius: 20px;
    }
    .md-pill.notice    { background: rgba(74,144,217,0.15);  color: #4a90d9;  border: 1px solid rgba(74,144,217,0.25); }
    .md-pill.agreement { background: rgba(201,162,39,0.15);  color: var(--gold); border: 1px solid rgba(201,162,39,0.25); }
    .md-pill.case      { background: rgba(224,85,85,0.15);   color: var(--red);  border: 1px solid rgba(224,85,85,0.25); }
    .md-pill.advise    { background: rgba(62,207,142,0.15);  color: var(--green);border: 1px solid rgba(62,207,142,0.25); }
    .md-pill.other     { background: rgba(155,109,255,0.15); color: var(--purple);border: 1px solid rgba(155,109,255,0.25); }
    .md-pill.running   { background: rgba(155,109,255,0.12); color: var(--purple);border: 1px solid rgba(155,109,255,0.25); }
    .md-pill.pending   { background: rgba(201,162,39,0.12);  color: var(--gold); border: 1px solid rgba(201,162,39,0.25); }
    .md-pill.completed { background: rgba(62,207,142,0.12);  color: var(--green);border: 1px solid rgba(62,207,142,0.25); }

    /* ── Info sections ── */
    .md-section {
      background: var(--dark2);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .md-section:last-child { margin-bottom: 0; }

    .md-section-head {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 15px 22px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
    }
    .md-section-head i { color: var(--gold); font-size: 0.95rem; width: 18px; text-align: center; }
    .md-section-head h3 {
      font-family: 'Playfair Display', serif;
      font-size: 0.98rem;
      color: var(--white);
    }

    .md-section-body {
      padding: 20px 22px;
    }

    /* Description text */
    .md-desc {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.8;
    }

    /* Info grid */
    .md-info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    .md-info-item {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .md-info-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .md-info-label i { color: var(--gold); font-size: 0.65rem; }
    .md-info-value {
      font-size: 0.88rem;
      color: var(--white);
      background: var(--dark3);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 10px 14px;
      word-break: break-word;
    }
    .md-info-value.empty { color: var(--muted); font-style: italic; }
    .md-info-full { grid-column: 1 / -1; }

    /* Timeline */
    .md-timeline {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .md-tl-item {
      display: flex;
      gap: 16px;
      padding-bottom: 20px;
      position: relative;
    }
    .md-tl-item:last-child { padding-bottom: 0; }
    .md-tl-item:not(:last-child)::before {
      content: '';
      position: absolute;
      left: 15px;
      top: 32px;
      bottom: 0;
      width: 2px;
      background: rgba(255,255,255,0.06);
    }
    .md-tl-dot {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem;
      flex-shrink: 0;
      border: 2px solid;
    }
    .md-tl-dot.done  { background: rgba(62,207,142,0.15); border-color: var(--green); color: var(--green); }
    .md-tl-dot.active{ background: rgba(201,162,39,0.15); border-color: var(--gold);  color: var(--gold); }
    .md-tl-dot.wait  { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.1); color: var(--muted); }
    .md-tl-content { flex: 1; padding-top: 4px; }
    .md-tl-title { font-size: 0.88rem; font-weight: 600; color: var(--white); margin-bottom: 3px; }
    .md-tl-sub   { font-size: 0.75rem; color: var(--muted); }

    /* Action buttons */
    .md-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 28px;
    }
    .md-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 22px;
      border-radius: 10px;
      font-size: 0.88rem; font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      border: none;
    }
    .md-btn.primary {
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: #1a1200;
      box-shadow: 0 4px 14px rgba(201,162,39,0.3);
    }
    .md-btn.primary:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(201,162,39,0.45); }
    .md-btn.secondary {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--muted);
    }
    .md-btn.secondary:hover { background: rgba(255,255,255,0.1); color: var(--white); }

    /* Light mode */
    body.light-mode .md-hero { background: linear-gradient(135deg, #e0e8f5 0%, #f0f4ff 60%, #e0e8f5 100%); border-color: rgba(201,162,39,0.2); }
    body.light-mode .md-section { border-color: rgba(0,0,0,0.08); }
    body.light-mode .md-section-head { border-bottom-color: rgba(0,0,0,0.07); }
    body.light-mode .md-info-value { border-color: rgba(0,0,0,0.07); }
    body.light-mode .md-back { border-color: rgba(0,0,0,0.1); }
    body.light-mode .md-tl-item::before { background: rgba(0,0,0,0.07); }

    /* Responsive */
    @media (max-width: 600px) {
      .md-wrap { padding: 18px 14px 40px; }
      .md-hero { flex-direction: column; gap: 14px; padding: 20px; }
      .md-info-grid { grid-template-columns: 1fr; }
      .md-topbar-title { font-size: 1.15rem; }
      .md-hero-body h2 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-left">
      <i class="fas fa-balance-scale"></i>
      <span class="firm-name">DK CORPORATE LAW FIRM</span>
    </div>
    <ul class="topbar-nav" id="topbarNav">
      <li><a href="matter.html" class="tnav-link">Home</a></li>
      <li><a href="terms.html" class="tnav-link">Terms &amp; Conditions</a></li>
      <li><a href="blog.html" class="tnav-link">Blog</a></li>
      <li><a href="contact.html" class="tnav-link">Contact Us</a></li>
    </ul>
    <div class="topbar-right">
      <div class="topbar-right-icons">
        <button class="theme-toggle-btn" id="themeToggleBtn" title="Toggle light/dark mode">
          <i class="fas fa-sun" id="themeIcon"></i>
        </button>
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">U</div>
          <div class="user-text">
            <span class="welcome-text">Welcome,</span>
            <span class="user-email" id="userEmail">user@email.com</span>
          </div>
          <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle menu">
            <span></span><span></span><span></span>
          </button>
          <button class="theme-toggle-btn theme-toggle-mobile" id="themeToggleMobile" title="Toggle light/dark mode">
            <i class="fas fa-sun" id="themeIconMobile"></i>
          </button>
          <a href="login.html" class="logout-btn" title="Logout"><i class="fas fa-right-from-bracket"></i></a>
        </div>
      </div>
    </div>
  </header>

  <div class="md-wrap" id="mdWrap">
    <!-- Filled by JS -->
  </div>

  <script>
    /* ── Session ── */
    const email = sessionStorage.getItem('userEmail') || 'user@email.com';
    document.getElementById('userEmail').textContent = email;
    document.getElementById('userAvatar').textContent = email.charAt(0).toUpperCase();

    /* ── Theme ── */
    function applyTheme(mode) {
      document.body.classList.toggle('light-mode', mode === 'light');
      const icon = mode === 'light' ? 'fa-moon' : 'fa-sun';
      document.getElementById('themeIcon').className = 'fas ' + icon;
      document.getElementById('themeIconMobile').className = 'fas ' + icon;
    }
    applyTheme(localStorage.getItem('dkcorporate_theme_client') || 'dark');
    function toggleTheme() {
      const next = document.body.classList.contains('light-mode') ? 'dark' : 'light';
      localStorage.setItem('dkcorporate_theme_client', next);
      applyTheme(next);
    }
    document.getElementById('themeToggleBtn').addEventListener('click', toggleTheme);
    document.getElementById('themeToggleMobile').addEventListener('click', toggleTheme);

    /* ── Mobile nav ── */
    document.getElementById('mobileMenuBtn').addEventListener('click', function () {
      document.getElementById('topbarNav').classList.toggle('open');
      this.classList.toggle('active');
    });

    /* ── Load matter ── */
    const matterId = parseInt(new URLSearchParams(location.search).get('id'));
    const MATTERS_KEY = `dkcorporate_matters_${email}`;
    const matters = JSON.parse(localStorage.getItem(MATTERS_KEY) || '[]');
    const m = matters.find(x => x.id === matterId);

    const TYPE_LABELS = { notice:'Notice', agreement:'Agreement', case:'Case', advise:'Legal Advise', other:'Other' };
    const TYPE_ICONS  = { notice:'fa-envelope', agreement:'fa-file-contract', case:'fa-gavel', advise:'fa-lightbulb', other:'fa-scale-balanced' };

    function matterNo(id) { return 'MN-' + String(id).slice(-6); }
    function fmtDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString('en-IN', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
    }
    function fmtDateShort(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
    }

    /* ── Render ── */
    function render() {
      const wrap = document.getElementById('mdWrap');

      if (!m) {
        wrap.innerHTML = `
          <div style="text-align:center;padding:80px 20px;color:var(--muted);">
            <i class="fas fa-folder-open" style="font-size:3rem;color:rgba(201,162,39,0.2);display:block;margin-bottom:16px;"></i>
            <h2 style="font-family:'Playfair Display',serif;color:var(--white);margin-bottom:8px;">Matter Not Found</h2>
            <p style="margin-bottom:20px;">This matter doesn't exist or belongs to a different account.</p>
            <a href="client_all_matters.html" class="md-btn primary"><i class="fas fa-arrow-left"></i> Back to My Matters</a>
          </div>`;
        return;
      }

      document.title = m.name + ' | DK CORPORATE LAW FIRM';

      const typeLabel  = TYPE_LABELS[m.type] || m.type;
      const typeIcon   = TYPE_ICONS[m.type]  || 'fa-scale-balanced';
      const mn         = matterNo(m.id);

      // Timeline steps based on status
      const steps = [
        { label: 'Matter Submitted',    sub: fmtDateShort(m.date), state: 'done' },
        { label: 'Under Review',        sub: 'Assigned to advocate', state: m.status !== 'pending' ? 'done' : 'active' },
        { label: 'In Progress',         sub: 'Active legal proceedings', state: m.status === 'running' ? 'active' : m.status === 'completed' ? 'done' : 'wait' },
        { label: 'Resolved / Completed',sub: m.status === 'completed' ? 'Matter closed' : 'Pending resolution', state: m.status === 'completed' ? 'done' : 'wait' },
      ];

      wrap.innerHTML = `
        <!-- Top bar -->
        <div class="md-topbar">
          <a href="client_all_matters.html" class="md-back" title="Back to My Matters"><i class="fas fa-arrow-left"></i></a>
          <span class="md-topbar-title">Matter Detail</span>
          <span class="md-topbar-no">${mn}</span>
        </div>

        <!-- Hero -->
        <div class="md-hero">
          <div class="md-hero-icon"><i class="fas ${typeIcon}"></i></div>
          <div class="md-hero-body">
            <h2>${m.name}</h2>
            <div class="md-hero-pills">
              <span class="md-pill ${m.type}"><i class="fas ${typeIcon}"></i>${typeLabel}</span>
              <span class="md-pill ${m.status}"><i class="fas fa-circle-dot"></i>${m.status.charAt(0).toUpperCase()+m.status.slice(1)}</span>
              <span class="md-pill pending" style="background:rgba(255,255,255,0.05);color:var(--muted);border-color:rgba(255,255,255,0.1);">
                <i class="fas fa-calendar"></i>${fmtDateShort(m.date)}
              </span>
            </div>
          </div>
        </div>

        <!-- Description -->
        <div class="md-section">
          <div class="md-section-head">
            <i class="fas fa-align-left"></i>
            <h3>Matter Description</h3>
          </div>
          <div class="md-section-body">
            <p class="md-desc">${m.desc || '—'}</p>
          </div>
        </div>

        <!-- Details -->
        <div class="md-section">
          <div class="md-section-head">
            <i class="fas fa-id-card"></i>
            <h3>Matter Information</h3>
          </div>
          <div class="md-section-body">
            <div class="md-info-grid">
              <div class="md-info-item">
                <div class="md-info-label"><i class="fas fa-hashtag"></i> Matter Number</div>
                <div class="md-info-value">${mn}</div>
              </div>
              <div class="md-info-item">
                <div class="md-info-label"><i class="fas fa-tag"></i> Type</div>
                <div class="md-info-value">${typeLabel}</div>
              </div>
              <div class="md-info-item">
                <div class="md-info-label"><i class="fas fa-circle-dot"></i> Status</div>
                <div class="md-info-value">${m.status.charAt(0).toUpperCase()+m.status.slice(1)}</div>
              </div>
              <div class="md-info-item">
                <div class="md-info-label"><i class="fas fa-calendar-plus"></i> Submitted On</div>
                <div class="md-info-value">${fmtDate(m.date)}</div>
              </div>
              <div class="md-info-item">
                <div class="md-info-label"><i class="fas fa-user"></i> Submitted By</div>
                <div class="md-info-value">${email}</div>
              </div>
              <div class="md-info-item">
                <div class="md-info-label"><i class="fas fa-building"></i> Firm</div>
                <div class="md-info-value">DK Corporate Law Firm</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Progress timeline -->
        <div class="md-section">
          <div class="md-section-head">
            <i class="fas fa-list-check"></i>
            <h3>Matter Progress</h3>
          </div>
          <div class="md-section-body">
            <div class="md-timeline">
              ${steps.map(s => `
                <div class="md-tl-item">
                  <div class="md-tl-dot ${s.state}">
                    <i class="fas ${s.state==='done'?'fa-check':s.state==='active'?'fa-spinner fa-spin':'fa-clock'}"></i>
                  </div>
                  <div class="md-tl-content">
                    <div class="md-tl-title">${s.label}</div>
                    <div class="md-tl-sub">${s.sub}</div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>

        <!-- Actions -->
        <div class="md-actions">
          <a href="client_all_matters.html" class="md-btn secondary"><i class="fas fa-arrow-left"></i> Back to All Matters</a>
          <a href="chat.html?matterId=${m.id}&matterName=${encodeURIComponent(m.name)}" class="md-btn primary"><i class="fas fa-comments"></i> Chat with Advocate</a>
        </div>
      `;
    }

    render();
  </script>
</body>
</html>
