<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Company Registration | DK CORPORATE LAW FIRM</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    /* ── Registration type toggle ── */
    .reg-type-bar {
      display: flex;
      align-items: center;
      gap: 0;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
    }
    .reg-type-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 9px 14px;
      border-radius: 7px;
      font-size: 0.82rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
      color: rgba(255,255,255,0.45);
      border: none;
      background: none;
    }
    .reg-type-btn.active {
      background: linear-gradient(135deg, #c9a227, #e8c84a);
      color: #1a1200;
      box-shadow: 0 2px 10px rgba(201,162,39,0.3);
    }
    .reg-type-btn:not(.active):hover { color: rgba(255,255,255,0.75); }
  </style>
</head>
<body>

  <div class="bg-overlay"></div>

  <div class="container">
    <div class="form-card">

      <div class="form-header">
        <div class="logo">
          <i class="fas fa-balance-scale"></i>
        </div>
        <h1>DK CORPORATE LAW FIRM</h1>
        <p>Only Company Registration</p>
      </div>

      <!-- Registration type toggle -->
      <div class="reg-type-bar">
        <button class="reg-type-btn active">
          <i class="fas fa-building"></i> Company
        </button>
        <a href="registration_individual.html" class="reg-type-btn">
          <i class="fas fa-user"></i> Individual
        </a>
      </div>

      <form id="registerForm" novalidate>

        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" id="fullname" placeholder="Full Name" required />
          <span class="error-msg" id="err-fullname"></span>
        </div>

        <div class="input-group">
          <i class="fas fa-briefcase"></i>
          <input type="text" id="business" placeholder="Company Name" required />
          <span class="error-msg" id="err-business"></span>
        </div>

        <div class="row-two">
          <div class="input-group">
            <i class="fas fa-phone"></i>
            <input type="tel" id="mobile" placeholder="Mobile No." required />
            <span class="error-msg" id="err-mobile"></span>
          </div>

          <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="Email Address" required />
            <span class="error-msg" id="err-email"></span>
          </div>
        </div>

        <div class="input-group">
          <i class="fas fa-id-badge"></i>
          <select id="position" required>
            <option value="" disabled selected>Select Position</option>
            <option>HR</option>
            <option>CEO</option>
            <option>Manager</option>
            <option>Corporate Counsel</option>
            <option>Clerk</option>
            <option>Other</option>
          </select>
          <span class="error-msg" id="err-position"></span>
        </div>

        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="Password" required />
          <i class="fas fa-eye toggle-pw" id="togglePw"></i>
          <span class="error-msg" id="err-password"></span>
        </div>

        <button type="submit" class="btn-submit">
          <span>Create Company Account</span>
          <i class="fas fa-arrow-right"></i>
        </button>

      </form>

      <div class="login-line">
        Already a client? &nbsp;<a href="login.html">Log in to continue</a>
      </div>

    </div>
  </div>

  <script src="./script/script.js"></script>
</body>
</html>
