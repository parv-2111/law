<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | DK CORPORATE LAW FIRM</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <div class="bg-overlay"></div>

  <div class="container">
    <div class="form-card">

      <div class="form-header">
        <div class="logo">
          <i class="fas fa-balance-scale"></i>
        </div>
        <h1>DK CORPORATE LAW FIRM</h1>
        <p>CIVIL | CRIMINAL | REVENUE </p>
      </div>

      <form id="loginForm" novalidate>

        <div class="input-group">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" placeholder="Email Address" required />
          <span class="error-msg" id="err-email"></span>
        </div>

        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="Password" required />
          <i class="fas fa-eye toggle-pw" id="togglePw"></i>
          <span class="error-msg" id="err-password"></span>
        </div>

        <div class="forgot-row">
          <a href="#">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-submit">
          <span>Login</span>
          <i class="fas fa-arrow-right"></i>
        </button>

      </form>

      <div class="login-line">
        Don't have an account? &nbsp;<a href="registration.html">Register here</a>
      </div>

    </div>
  </div>

  <script src="./script/login.js"></script>
</body>
</html>
