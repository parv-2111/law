<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login | DK CORPORATE LAW FIRM</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="login-page">

  <div class="login-wrapper">

    <div class="login-left">
      <div class="brand">
        <i class="fas fa-balance-scale"></i>
        <h1>DK CORPORATE LAW FIRM</h1>
        <p>CIVIL | CRIMINAL | REVENUE </p>
      </div>
      <div class="tagline">
        <h2>Admin Control Panel</h2>
        <p>Restricted access — authorized person only.</p>
      </div>
      <div class="decor-circles">
        <span class="c1"></span>
        <span class="c2"></span>
        <span class="c3"></span>
      </div>
    </div>

    <div class="login-right">
      <div class="login-box">
        <div class="lock-icon"><i class="fas fa-shield-halved"></i></div>
        <h3>Owner Access</h3>
        <p class="sub">Enter your credentials to continue</p>

        <form id="adminLoginForm" novalidate>

          <div class="field">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="Admin Email" required/>
            <span class="err" id="err-email"></span>
          </div>

          <div class="field">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Password" required/>
            <i class="fas fa-eye eye-toggle" id="togglePw"></i>
            <span class="err" id="err-password"></span>
          </div>

          <button type="submit" class="btn-login">
            <span>Sign In</span>
            <i class="fas fa-arrow-right"></i>
          </button>

          <p class="err-global" id="err-global"></p>
        </form>
      </div>
    </div>

  </div>

  <script src="script/login.js"></script>
</body>
</html>
