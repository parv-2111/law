<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Chat | DK CORPORATE LAW FIRM</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="dashboard-body">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <i class="fas fa-balance-scale"></i>
      <span>DK CORPORATE LAW FIRM</span>
      <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar"><i class="fas fa-bars"></i></button>
    </div>
    <div class="sidebar-search">
      <i class="fas fa-search"></i>
      <input type="text" id="masterSearch" placeholder="Search…"/>
      <div class="search-results" id="searchResults"></div>
    </div>
    <ul class="sidebar-nav">
      <li><a href="index.html"><i class="fas fa-gauge-high"></i><span>Dashboard</span></a></li>
      <li><a href="cases.html"><i class="fas fa-folder-open"></i><span>Cases</span></a></li>
      <li><a href="notice.html"><i class="fas fa-envelope"></i><span>Notice</span></a></li>
      <li><a href="clients.html"><i class="fas fa-users"></i><span>Clients</span></a></li>
      <li><a href="payments.html"><i class="fas fa-credit-card"></i><span>Payments</span></a></li>
      <li><a href="matters.html"><i class="fas fa-scale-balanced"></i><span>Matters</span></a></li>
      <li><a href="admin_chat.html" class="active"><i class="fas fa-comments"></i><span>Chat</span></a></li>
    </ul>
    <div class="sidebar-footer">
      <button class="theme-toggle-btn" id="themeToggleBtn" title="Toggle light/dark mode">
        <i class="fas fa-sun" id="themeIcon"></i>
        <span id="themeLabel">Light Mode</span>
      </button>
      <a href="login.html"><i class="fas fa-right-from-bracket"></i><span>Logout</span></a>
    </div>
  </aside>

  <main class="main-content" style="padding:0; display:flex; flex-direction:column; height:100vh; overflow:hidden;">

    <div class="admin-chat-wrap">

      <!-- CLIENT LIST -->
      <div class="ac-sidebar" id="acSidebar">
        <div class="ac-sidebar-head">
          <h2><i class="fas fa-comments"></i> Client Chats</h2>
          <span class="hearing-count" id="clientCount">0</span>
        </div>
        <div class="ac-search">
          <i class="fas fa-search"></i>
          <input type="text" id="acSearch" placeholder="Search clients…"/>
        </div>
        <div class="ac-client-list" id="acClientList">
          <div class="ac-empty"><i class="fas fa-inbox"></i><p>No client chats yet.</p></div>
        </div>
      </div>

      <!-- CHAT PANEL -->
      <div class="ac-chat-panel" id="acChatPanel">
        <div class="ac-no-chat" id="acNoChat">
          <i class="fas fa-comments"></i>
          <p>Select a client to view their chat</p>
        </div>
        <div class="ac-active-chat" id="acActiveChat" style="display:none;">
          <div class="ac-chat-header" id="acChatHeader">
            <div class="ac-chat-header-left">
              <div class="ac-avatar" id="acHeaderAvatar">?</div>
              <div>
                <div class="ac-header-name" id="acHeaderName">Client</div>
                <div class="ac-header-sub" id="acHeaderSub">client@email.com</div>
              </div>
            </div>
            <div class="ac-header-actions">
              <button class="ac-clear-btn" id="acClearBtn" title="Clear chat history">
                <i class="fas fa-trash"></i> Clear
              </button>
            </div>
          </div>
          <div class="ac-messages" id="acMessages"></div>
          <div class="ac-typing" id="acTyping" style="display:none;">
            <span></span><span></span><span></span>
          </div>
          <div class="ac-input-bar" style="position:relative;">
            <!-- File attach -->
            <label class="ac-icon-btn" title="Attach file">
              <i class="fas fa-paperclip"></i>
              <input type="file" id="acFileInput" multiple accept="image/*,.pdf,.doc,.docx,.xls,.xlsx" style="display:none;"/>
            </label>
            <!-- Emoji toggle -->
            <button class="ac-icon-btn" id="acEmojiBtn" title="Emoji">
              <i class="fas fa-face-smile"></i>
            </button>
            <!-- Emoji picker -->
            <div class="ac-emoji-picker" id="acEmojiPicker">
              <div class="aep-search">
                <i class="fas fa-search"></i>
                <input type="text" id="aepSearch" placeholder="Search emoji…"/>
              </div>
              <div class="aep-grid" id="aepGrid"></div>
            </div>
            <div class="ac-input" id="acInput" contenteditable="true" data-placeholder="Type a reply…"></div>
            <button class="ac-send-btn" id="acSendBtn"><i class="fas fa-paper-plane"></i></button>
          </div>
          <!-- File preview bar -->
          <div class="ac-file-preview" id="acFilePreview"></div>
        </div>
      </div>

    </div>

  </main>

  <style>
    /* ── Attach & Emoji icon buttons ── */
    .ac-icon-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: none;
      border: 1.5px solid rgba(255,255,255,0.08);
      color: var(--muted);
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      position: relative;
    }
    .ac-icon-btn:hover { background: rgba(201,162,39,0.1); color: var(--gold); border-color: rgba(201,162,39,0.3); }
    .ac-icon-btn.active { background: rgba(201,162,39,0.15); color: var(--gold2); border-color: var(--gold); }

    /* ── Emoji picker ── */
    .ac-emoji-picker {
      position: absolute;
      bottom: calc(100% + 10px);
      left: 0;
      width: 300px;
      background: var(--navy2);
      border: 1px solid rgba(201,162,39,0.2);
      border-radius: 14px;
      box-shadow: 0 12px 36px rgba(0,0,0,0.5);
      z-index: 300;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    .ac-emoji-picker.open { display: flex; }

    .aep-search {
      position: relative;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .aep-search > i {
      position: absolute; left: 22px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); font-size: 0.75rem;
      pointer-events: none;
    }
    .aep-search input {
      width: 100%;
      padding: 7px 10px 7px 28px;
      background: var(--navy3);
      border: 1.5px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      color: var(--white);
      font-size: 0.82rem;
      font-family: 'Inter', sans-serif;
      outline: none;
    }
    .aep-search input:focus { border-color: var(--gold); }
    .aep-search input::placeholder { color: var(--muted); }

    .aep-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 2px;
      padding: 10px;
      max-height: 200px;
      overflow-y: auto;
    }
    .aep-grid::-webkit-scrollbar { width: 3px; }
    .aep-grid::-webkit-scrollbar-thumb { background: rgba(201,162,39,0.2); border-radius: 3px; }

    .aep-emoji {
      font-size: 1.3rem;
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.15s;
      border: none; background: none;
      line-height: 1;
    }
    .aep-emoji:hover { background: rgba(201,162,39,0.12); }

    /* ── File preview bar ── */
    .ac-file-preview {
      display: none;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px 16px 0;
    }
    .ac-file-preview.has-files { display: flex; }

    .afp-item {
      display: flex; align-items: center; gap: 7px;
      background: var(--navy3);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.78rem;
      color: var(--white);
      max-width: 180px;
    }
    .afp-item i { color: var(--gold); font-size: 0.85rem; flex-shrink: 0; }
    .afp-item .afp-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .afp-item .afp-remove {
      background: none; border: none;
      color: var(--muted); cursor: pointer; font-size: 0.8rem;
      padding: 0; flex-shrink: 0;
      transition: color 0.2s;
    }
    .afp-item .afp-remove:hover { color: var(--red); }

    .afp-img-thumb {
      width: 36px; height: 36px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
    }

    /* Light mode */
    body.admin-light .ac-icon-btn { border-color: rgba(0,0,0,0.1); }
    body.admin-light .ac-emoji-picker { background: #fff; border-color: rgba(201,162,39,0.25); }
    body.admin-light .aep-search { border-bottom-color: rgba(0,0,0,0.07); }
    body.admin-light .afp-item { background: #e8edf5; border-color: rgba(0,0,0,0.08); }
  </style>

  <script src="script/search.js"></script>
  <script src="script/admin_chat.js"></script>
  <script>
    /* ── Theme ── */
    (function(){
      function applyTheme(m){
        document.body.classList.toggle('admin-light',m==='light');
        document.getElementById('themeIcon').className='fas '+(m==='light'?'fa-moon':'fa-sun');
        document.getElementById('themeLabel').textContent=m==='light'?'Dark Mode':'Light Mode';
      }
      var t=localStorage.getItem('dkcorporate_theme_admin')||'dark'; applyTheme(t);
      document.getElementById('themeToggleBtn').addEventListener('click',function(){
        var n=document.body.classList.contains('admin-light')?'dark':'light';
        localStorage.setItem('dkcorporate_theme_admin',n); applyTheme(n);
      });
    })();

    /* ── Emoji data ── */
    const EMOJIS = [
      '😀','😁','😂','😃','😄','😅','😆','😇','😈','😉',
      '😊','😋','😌','😍','😎','😏','😐','😑','😒','😓',
      '😔','😕','😖','😗','😘','😙','😚','😛','😜','😝',
      '😞','😟','😠','😡','😢','😣','😤','😥','😦','😧',
      '😨','😩','😪','😫','😬','😭','😮','😯','😰','😱',
      '😲','😳','😴','😵','😶','😷','😸','😹','😺','😻',
      '👍','👎','👏','👊','✌️','🤞','👌','🤏','👈','👉',
      '👆','👇','☝️','🤚','💪','💌','🔥','❤️','💛','💚',
      '💙','💜','💔','💕','💖','💗','💘','⭐','🌟','⚡',
      '🎉','🎈','🎁','🎀','🎂','🎃','💀','👑','💎','💰',
      '💼','📋','📄','📝','✅','❌','⚠️','🚨','🔔','🔕',
      '📞','📱','💻','🖥️','📧','📨','📩','📪','📫','📬'
    ];

    /* ── Render emoji grid ── */
    function renderEmojis(filter) {
      const grid = document.getElementById('aepGrid');
      const list = filter ? EMOJIS.filter(e => e.includes(filter)) : EMOJIS;
      grid.innerHTML = list.map(e =>
        `<button class="aep-emoji" type="button" data-e="${e}">${e}</button>`
      ).join('');
    }
    renderEmojis('');

    /* ── Emoji picker toggle ── */
    const emojiBtn  = document.getElementById('acEmojiBtn');
    const emojiPicker = document.getElementById('acEmojiPicker');
    const aepSearch = document.getElementById('aepSearch');
    const acInput   = document.getElementById('acInput');

    emojiBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      const open = emojiPicker.classList.toggle('open');
      emojiBtn.classList.toggle('active', open);
      if (open) { aepSearch.value = ''; renderEmojis(''); aepSearch.focus(); }
    });

    aepSearch.addEventListener('input', function() {
      renderEmojis(this.value.trim());
    });

    document.getElementById('aepGrid').addEventListener('click', function(e) {
      const btn = e.target.closest('.aep-emoji');
      if (!btn) return;
      const emoji = btn.dataset.e;
      // insert at cursor inside contenteditable
      acInput.focus();
      const sel = window.getSelection();
      if (sel.rangeCount) {
        const range = sel.getRangeAt(0);
        range.deleteContents();
        range.insertNode(document.createTextNode(emoji));
        range.collapse(false);
        sel.removeAllRanges();
        sel.addRange(range);
      } else {
        acInput.textContent += emoji;
      }
    });

    // close picker on outside click
    document.addEventListener('click', function(e) {
      if (!emojiPicker.contains(e.target) && e.target !== emojiBtn) {
        emojiPicker.classList.remove('open');
        emojiBtn.classList.remove('active');
      }
    });

    /* ── File attachment ── */
    const fileInput   = document.getElementById('acFileInput');
    const filePreview = document.getElementById('acFilePreview');
    let attachedFiles = [];

    fileInput.addEventListener('change', function() {
      Array.from(this.files).forEach(addFile);
      this.value = '';
    });

    function addFile(file) {
      if (attachedFiles.find(f => f.name === file.name && f.size === file.size)) return;
      attachedFiles.push(file);
      renderFilePreviews();
    }

    function removeFile(idx) {
      attachedFiles.splice(idx, 1);
      renderFilePreviews();
    }

    function renderFilePreviews() {
      if (!attachedFiles.length) {
        filePreview.classList.remove('has-files');
        filePreview.innerHTML = '';
        return;
      }
      filePreview.classList.add('has-files');
      filePreview.innerHTML = attachedFiles.map((f, i) => {
        const isImg = f.type.startsWith('image/');
        const icon  = isImg ? 'fa-image' : f.name.endsWith('.pdf') ? 'fa-file-pdf' : 'fa-file';
        const thumb = isImg
          ? `<img class="afp-img-thumb" src="${URL.createObjectURL(f)}" alt=""/>`
          : `<i class="fas ${icon}"></i>`;
        return `<div class="afp-item">
          ${thumb}
          <span class="afp-name">${f.name}</span>
          <button class="afp-remove" onclick="removeFile(${i})" title="Remove"><i class="fas fa-xmark"></i></button>
        </div>`;
      }).join('');
    }
    (function(){
      var s=document.querySelector('.sidebar'),m=document.querySelector('.main-content');
      var exp=localStorage.getItem("sidebarExpanded")==="1";if(exp){s.classList.add("expanded");}if(m)m.style.marginLeft=exp?"var(--sidebar-w)":"64px";
      document.getElementById('sidebarToggle').addEventListener('click',function(){
        var open=s.classList.toggle('expanded');
        if(m)m.style.marginLeft=open?'var(--sidebar-w)':'64px';
        localStorage.setItem('sidebarExpanded',open?'1':'0');
      });
    })();
  </script>
</body>
</html>
