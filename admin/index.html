<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard | DK CORPORATE LAW FIRM Admin</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="dashboard-body">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <i class="fas fa-balance-scale"></i>
      <span>DK CORPORATE LAW FIRM</span>
    </div>

    <!-- Search box in sidebar -->
    <div class="sidebar-search">
      <i class="fas fa-search"></i>
      <input type="text" id="masterSearch" placeholder="Search…"/>
      <div class="search-results" id="searchResults"></div>
    </div>

    <ul class="sidebar-nav">
      <li><a href="index.html" class="active"><i class="fas fa-gauge-high"></i><span>Dashboard</span></a></li>
      <li><a href="cases.html"><i class="fas fa-folder-open"></i><span>Cases</span></a></li>
      <li><a href="notice.html"><i class="fas fa-envelope"></i><span>Notice</span></a></li>
      <li><a href="clients.html"><i class="fas fa-users"></i><span>Clients</span></a></li>
      <li><a href="payments.html"><i class="fas fa-credit-card"></i><span>Payments</span></a></li>
      <li><a href="matters.html"><i class="fas fa-scale-balanced"></i><span>Matters</span></a></li>
      <li><a href="admin_chat.html"><i class="fas fa-comments"></i><span>Chat</span></a></li>
    </ul>
    <div class="sidebar-footer">
      <a href="login.html"><i class="fas fa-right-from-bracket"></i><span>Logout</span></a>
    </div>
  </aside>

  <main class="main-content">
    <h1 class="page-title">Dashboard</h1>
    <p class="page-sub">Welcome back, Admin. Here's your overview.</p>

    <div class="cards-grid">

      <a href="cases.html" class="stat-card card-blue">
        <div class="card-icon"><i class="fas fa-folder-open"></i></div>
        <div class="stat-num">55</div>
        <div class="stat-label">Total Cases</div>
        <i class="fas fa-arrow-right stat-arrow"></i>
      </a>

      <a href="clients.html" class="stat-card card-gold">
        <div class="card-icon"><i class="fas fa-users"></i></div>
        <div class="stat-num">63</div>
        <div class="stat-label">Total Clients</div>
        <i class="fas fa-arrow-right stat-arrow"></i>
      </a>

      <a href="payments.html" class="stat-card card-purple">
        <div class="card-icon"><i class="fas fa-credit-card"></i></div>
        <div class="stat-num">$48k</div>
        <div class="stat-label">Total Payments</div>
        <i class="fas fa-arrow-right stat-arrow"></i>
      </a>

      <a href="matters.html" class="stat-card card-green">
        <div class="card-icon"><i class="fas fa-scale-balanced"></i></div>
        <div class="stat-num">42</div>
        <div class="stat-label">Total Matters</div>
        <i class="fas fa-arrow-right stat-arrow"></i>
      </a>

    </div>

    <!-- ── HEARING CALENDAR ── -->
    <div class="dash-calendar-wrap">

      <!-- Left: Calendar -->
      <div class="dash-cal-panel">
        <div class="dash-section-head">
          <i class="fas fa-calendar-days"></i>
          <h2>Hearing Calendar</h2>
        </div>
        <div class="dash-cal">
          <div class="dash-cal-nav">
            <button id="prevMonth"><i class="fas fa-chevron-left"></i></button>
            <span id="calTitle"></span>
            <button id="nextMonth"><i class="fas fa-chevron-right"></i></button>
          </div>
          <div class="dash-cal-days-head">
            <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
          </div>
          <div class="dash-cal-grid" id="calGrid"></div>
        </div>
      </div>

      <!-- Right: Hearings list -->
      <div class="dash-hearings-panel">
        <div class="dash-section-head">
          <i class="fas fa-gavel"></i>
          <h2>Scheduled Hearings</h2>
          <span class="hearing-count" id="hearingCount">0</span>
        </div>

        <!-- Filter bar -->
        <div class="hearing-filters">
          <button class="hf-btn active" data-filter="all">All</button>
          <button class="hf-btn" data-filter="upcoming">Upcoming</button>
          <button class="hf-btn" data-filter="today">Today</button>
          <button class="hf-btn" data-filter="past">Past</button>
        </div>

        <div class="hearings-list" id="hearingsList"></div>
      </div>

    </div>

    <!-- ── HEARING DETAIL MODAL ── -->
    <div class="hearing-modal-overlay" id="hearingModalOverlay">
      <div class="hearing-modal" id="hearingModal">
        <button class="modal-close" id="modalClose"><i class="fas fa-xmark"></i></button>
        <div class="modal-badge" id="modalBadge"></div>
        <h3 class="modal-title" id="modalTitle"></h3>
        <div class="modal-meta" id="modalMeta"></div>
        <div class="modal-details" id="modalDetails"></div>
      </div>
    </div>

  </main>

  <script src="script/search.js"></script>
  <script src="script/dashboard.js"></script>
</body>
</html>
